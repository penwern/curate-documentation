site_name: Soteria+ Documentation
docs_dir: soteria-plus-docs
site_url: https://penwern.github.io/sotera-plus-documentation/
theme:
  name: 'material'
  logo: /curate-documentation/assets/Max Communications Logo Large.png
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode with high contrast
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
extra_css:
  - style.css
  - https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css
extra:
  homepage: https://www.maxcommunications.co.uk
nav:
  - Home: index.markdown
  - General: general.md
  - Application Areas: application-areas.md
  - Upload & Ingest: upload-ingest.md
  - Appraisal: appraisal.md
  - Preservation: preservation.md
  - Packaging: packaging.md
  - Email Processing: email-processing.md
  - Miscellaneous: miscellaneous.md
  - Search & Access: search-access.md
  - Security: security.md
  - Integrations: integrations.md
  - Exporting Metadata: exporting-metadata.md
plugins:
  - redirects:
      redirect_maps:
        'documentation.md': 'index.markdown'
markdown_extensions:
  - toc:
      permalink: true